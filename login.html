<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login — M&Y Fitness</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/navbar.css">
    <link rel="stylesheet" href="css/hero.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/pages.css">
    <link rel="stylesheet" href="css/footer.css">
</head>

<body>

    <iframe src="Header.html" style="width:100%; height:100px; border:none;"></iframe>
    <div class="page-header">
        <div class="container">
            <h1 style="text-align: center; margin-top: 30px;">Member Login</h1>

        </div>
    </div>

    <main>
        <div class="container">

            <div class="login-box">
                <h2>Sign In</h2>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="you@example.com" />
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" />
                </div>

                <div class="form-group">
                    <button type="submit" class="btn" style="width: 100%;">Log In</button>
                </div>

                <p style="text-align: center; font-size: 14px; margin-top: 8px;">
                    <a href="#">Forgot your password?</a>
                </p>

                <hr />


            </div>

            <br />



        </div>
    </main>

    <iframe src="Footer.html" style="width:100%; height:360px; border:none; margin-bottom: -10px;"></iframe>

</body>

</html>
