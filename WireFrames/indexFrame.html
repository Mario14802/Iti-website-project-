<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>M&Y Fitness — Wireframe</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f4f0;
      color: #1a1a18;
      padding: 2rem 1rem;
    }

    .wf {
      max-width: 680px;
      margin: 0 auto;
    }

    .section-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: .09em;
      text-transform: uppercase;
      color: #888780;
      margin-bottom: 6px;
    }

    .block {
      background: #eeecea;
      border: 0.5px solid #c8c6be;
      border-radius: 8px;
      margin-bottom: 12px;
      overflow: hidden;
      position: relative;
    }

    .block-inner {
      padding: 14px 16px;
    }

    /* NAV */
    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      background: #ffffff;
      border-bottom: 0.5px solid #dddbd3;
    }

    .logo-box {
      width: 80px;
      height: 20px;
      background: #c8c6be;
      border-radius: 4px;
    }

    .nav-links {
      display: flex;
      gap: 20px;
    }

    .nav-link {
      width: 44px;
      height: 10px;
      background: #dddbd3;
      border-radius: 3px;
    }

    .nav-cta {
      width: 70px;
      height: 26px;
      border-radius: 8px;
      background: #b4b2a9;
    }

    /* HERO */
    .hero {
      min-height: 220px;
      background: repeating-linear-gradient(45deg, #eeecea, #eeecea 6px, #e4e2de 6px, #e4e2de 12px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 28px 20px;
    }

    .hero-badge {
      width: 90px;
      height: 10px;
      background: #c8c6be;
      border-radius: 3px;
    }

    .hero-h1 {
      width: 260px;
      height: 28px;
      background: #b4b2a9;
      border-radius: 4px;
    }

    .hero-sub {
      width: 200px;
      height: 10px;
      background: #dddbd3;
      border-radius: 3px;
    }

    .hero-btns {
      display: flex;
      gap: 10px;
    }

    .btn-solid {
      width: 100px;
      height: 32px;
      border-radius: 8px;
      background: #b4b2a9;
    }

    .btn-outline {
      width: 100px;
      height: 32px;
      border-radius: 8px;
      background: transparent;
      border: 1.5px solid #c8c6be;
    }

    /* STATS BAR */
    .stats-bar {
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding: 14px 20px;
      background: #ffffff;
      border-top: 0.5px solid #dddbd3;
      border-bottom: 0.5px solid #dddbd3;
    }

    .stat {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
    }

    .stat-num {
      width: 40px;
      height: 14px;
      background: #b4b2a9;
      border-radius: 3px;
    }

    .stat-lbl {
      width: 54px;
      height: 8px;
      background: #dddbd3;
      border-radius: 3px;
    }

    .stat-divider {
      width: 0.5px;
      height: 30px;
      background: #dddbd3;
    }

    /* SECTION HEADER */
    .sec-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
    }

    .sec-title {
      width: 160px;
      height: 18px;
      background: #b4b2a9;
      border-radius: 4px;
    }

    .sec-sub {
      width: 240px;
      height: 9px;
      background: #dddbd3;
      border-radius: 3px;
    }

    /* CARDS GRID */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 12px;
    }

    .card {
      background: #ffffff;
      border: 0.5px solid #dddbd3;
      border-radius: 12px;
      padding: 14px 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .card.featured {
      border: 1.5px solid #7aabdc;
    }

    .card-badge {
      width: 60px;
      height: 16px;
      background: #c8c6be;
      border-radius: 20px;
    }

    .card-title {
      width: 80px;
      height: 13px;
      background: #b4b2a9;
      border-radius: 3px;
    }

    .card-line {
      height: 8px;
      background: #dddbd3;
      border-radius: 3px;
    }

    .card-btn {
      width: 70px;
      height: 26px;
      border-radius: 8px;
      background: #c8c6be;
      margin-top: 4px;
    }

    .popular-badge {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 7px;
      background: #dbedf8;
      color: #185fa5;
      border-radius: 20px;
      width: fit-content;
      margin-bottom: 2px;
    }

    /* FEATURES */
    .features-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 12px;
    }

    .feat-card {
      background: #ffffff;
      border: 0.5px solid #dddbd3;
      border-radius: 12px;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .feat-icon {
      width: 28px;
      height: 28px;
      background: #c8c6be;
      border-radius: 6px;
    }

    .feat-title {
      width: 80px;
      height: 11px;
      background: #b4b2a9;
      border-radius: 3px;
    }

    /* TESTIMONIALS */
    .testi-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 12px;
    }

    .testi-card {
      background: #ffffff;
      border: 0.5px solid #dddbd3;
      border-radius: 12px;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .testi-stars {
      display: flex;
      gap: 3px;
    }

    .star {
      width: 10px;
      height: 10px;
      background: #b4b2a9;
      border-radius: 2px;
    }

    .testi-author {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .avatar {
      width: 28px;
      height: 28px;
      background: #c8c6be;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .author-name {
      width: 70px;
      height: 9px;
      background: #b4b2a9;
      border-radius: 3px;
    }

    .author-sub {
      width: 50px;
      height: 7px;
      background: #dddbd3;
      border-radius: 3px;
      margin-top: 4px;
    }

    /* CTA BANNER */
    .cta-banner {
      background: repeating-linear-gradient(-45deg, #eeecea, #eeecea 6px, #e4e2de 6px, #e4e2de 12px);
      padding: 30px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    /* FOOTER */
    .footer {
      padding: 16px 20px 10px;
      background: #eeecea;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .footer-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .footer-logo {
      width: 70px;
      height: 14px;
      background: #b4b2a9;
      border-radius: 3px;
    }

    .footer-links-group {
      display: flex;
      gap: 32px;
    }

    .footer-col {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .footer-col-title {
      width: 50px;
      height: 9px;
      background: #b4b2a9;
      border-radius: 3px;
      margin-bottom: 2px;
    }

    .footer-col-link {
      width: 64px;
      height: 8px;
      background: #dddbd3;
      border-radius: 3px;
    }

    .footer-divider {
      height: 0.5px;
      background: #dddbd3;
    }

    .footer-bottom {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .footer-copy {
      width: 130px;
      height: 8px;
      background: #dddbd3;
      border-radius: 3px;
    }

    .footer-socials {
      display: flex;
      gap: 8px;
    }

    .social-icon {
      width: 22px;
      height: 22px;
      background: #c8c6be;
      border-radius: 5px;
    }

    /* Annotation + section separators */
    .ann {
      display: inline-block;
      font-size: 10px;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 20px;
      background: #dbedf8;
      color: #185fa5;
      position: absolute;
      top: 8px;
      right: 10px;
    }

    .section-sep {
      text-align: center;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: .07em;
      text-transform: uppercase;
      color: #888780;
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 14px 0 6px;
    }

    .section-sep::before,
    .section-sep::after {
      content: '';
      flex: 1;
      height: 0.5px;
      background: #dddbd3;
    }
  </style>
</head>

<body>
  <div class="wf">

    <!-- NAVBAR -->
    <div class="section-label">Navigation bar</div>
    <div class="block">
      <div class="nav">
        <div class="logo-box"></div>
        <div class="nav-links">
          <div class="nav-link"></div>
          <div class="nav-link"></div>
          <div class="nav-link"></div>
          <div class="nav-link"></div>
        </div>
        <div class="nav-cta"></div>
      </div>
      <span class="ann">sticky</span>
    </div>

    <!-- HERO -->
    <div class="section-label" style="margin-top:4px">Hero section</div>
    <div class="block">
      <div class="hero">
        <div class="hero-badge"></div>
        <div class="hero-h1"></div>
        <div class="hero-sub"></div>
        <div style="width:220px;height:8px;background:#dddbd3;border-radius:3px;"></div>
        <div class="hero-btns" style="margin-top:4px">
          <div class="btn-solid"></div>
          <div class="btn-outline"></div>
        </div>
      </div>
      <span class="ann">full-width bg image</span>
    </div>

    <!-- STATS BAR -->
    <div class="section-label" style="margin-top:4px">Stats bar</div>
    <div class="block">
      <div class="stats-bar">
        <div class="stat">
          <div class="stat-num"></div>
          <div class="stat-lbl"></div>
        </div>
        <div class="stat-divider"></div>
        <div class="stat">
          <div class="stat-num"></div>
          <div class="stat-lbl"></div>
        </div>
        <div class="stat-divider"></div>
        <div class="stat">
          <div class="stat-num"></div>
          <div class="stat-lbl"></div>
        </div>
        <div class="stat-divider"></div>
        <div class="stat">
          <div class="stat-num"></div>
          <div class="stat-lbl"></div>
        </div>
      </div>
    </div>

    <!-- PROGRAMS -->
    <div class="section-sep">Programs section</div>

    <div class="section-label">Program cards (3-col grid)</div>
    <div class="cards-grid">
      <div class="card">
        <div class="card-badge"></div>
        <div class="card-title"></div>
        <div class="card-line" style="width:90%"></div>
        <div class="card-line" style="width:80%"></div>
        <div class="card-line" style="width:60%"></div>
        <div class="card-btn"></div>
      </div>
      <div class="card featured">
        <div class="popular-badge">Popular</div>
        <div class="card-badge"></div>
        <div class="card-title"></div>
        <div class="card-line" style="width:95%"></div>
        <div class="card-line" style="width:85%"></div>
        <div class="card-line" style="width:70%"></div>
        <div class="card-btn"></div>
      </div>
      <div class="card">
        <div class="card-badge"></div>
        <div class="card-title"></div>
        <div class="card-line" style="width:90%"></div>
        <div class="card-line" style="width:75%"></div>
        <div class="card-line" style="width:55%"></div>
        <div class="card-btn"></div>
      </div>
    </div>


    <!-- FOOTER -->
    <div class="section-sep">Footer</div>
    <div class="block">
      <div class="footer">
        <div class="footer-top">
          <div>
            <div class="footer-logo"></div>
            <div style="width:120px;height:8px;background:#dddbd3;border-radius:3px;margin-top:8px;"></div>
            <div style="width:90px;height:8px;background:#dddbd3;border-radius:3px;margin-top:5px;"></div>
          </div>
          <div class="footer-links-group">
            <div class="footer-col">
              <div class="footer-col-title"></div>
              <div class="footer-col-link"></div>
              <div class="footer-col-link" style="width:50px"></div>
              <div class="footer-col-link" style="width:56px"></div>
            </div>
            <div class="footer-col">
              <div class="footer-col-title"></div>
              <div class="footer-col-link"></div>
              <div class="footer-col-link" style="width:48px"></div>
              <div class="footer-col-link" style="width:60px"></div>
            </div>
            <div class="footer-col">
              <div class="footer-col-title"></div>
              <div class="footer-col-link"></div>
              <div class="footer-col-link" style="width:52px"></div>
              <div class="footer-col-link" style="width:44px"></div>
            </div>
          </div>
        </div>
        <div class="footer-divider"></div>
        <div class="footer-bottom">
          <div class="footer-copy"></div>
          <div class="footer-socials">
            <div class="social-icon"></div>
            <div class="social-icon"></div>
            <div class="social-icon"></div>
          </div>
        </div>
      </div>
    </div>

  </div>
</body>

</html>
